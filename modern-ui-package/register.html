<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Create Account</title>
    <meta name="description" content="Register a new client account on AutoInsight.">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/forms.css">
    <style>
        .auth-card {
            max-width: 520px;
        }
    </style>
</head>

<body class="auth-bg vms-app">
    <div class="bg-glow"></div>

    <div class="auth-card card fade-in">
        <div class="card-body">
            <div class="brand-row">
                <span class="brand-pill"><i class="bi bi-car-front-fill"></i> AutoInsight</span>
                <a href="./login.html" class="auth-back-btn" title="Back to Login"><i class="bi bi-arrow-left"></i></a>
            </div>

            <h2 class="auth-title">Create Account</h2>
            <p class="auth-subtitle">Join AutoInsight and manage your vehicle services with ease.</p>

            <div class="auth-divider"></div>

            <form id="registerForm">
                <div class="row g-3">
                    <div class="col-6">
                        <label class="form-label">First Name</label>
                        <input id="regFirstName" type="text" class="form-control" placeholder="John" required>
                    </div>
                    <div class="col-6">
                        <label class="form-label">Last Name</label>
                        <input id="regLastName" type="text" class="form-control" placeholder="Doe" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Email Address</label>
                        <input id="regEmail" type="email" class="form-control" placeholder="john@example.com" required>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Phone Number</label>
                        <input id="regPhone" type="tel" class="form-control" placeholder="+1 555 0100">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Password</label>
                        <div class="input-group">
                            <input id="regPassword" type="password" class="form-control" placeholder="Min. 6 characters"
                                required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePass1"><i
                                    class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <input id="regPasswordConfirm" type="password" class="form-control"
                                placeholder="Repeat password" required>
                            <button class="btn btn-outline-secondary" type="button" id="togglePass2"><i
                                    class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="col-12">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="termsCheck" required>
                            <label class="form-check-label" for="termsCheck"
                                style="color:var(--sidebar-text);font-size:.88rem;">
                                I agree to the <a href="#" style="color:#818cf8;">Terms of Service</a> and <a href="#"
                                    style="color:#818cf8;">Privacy Policy</a>
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-auth text-white mt-3">
                    <i class="bi bi-person-plus me-2"></i> Create Account
                </button>

                <div class="auth-link-row">
                    Already have an account? <a href="./login.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
    <script>
        function togglePw(btnId, inputId) {
            document.getElementById(btnId).addEventListener('click', function () {
                const inp = document.getElementById(inputId);
                const icon = this.querySelector('i');
                if (inp.type === 'password') { inp.type = 'text'; icon.className = 'bi bi-eye-slash'; }
                else { inp.type = 'password'; icon.className = 'bi bi-eye'; }
            });
        }
        togglePw('togglePass1', 'regPassword');
        togglePw('togglePass2', 'regPasswordConfirm');
    </script>
</body>

</html>

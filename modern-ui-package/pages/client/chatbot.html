<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — AI Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">My Account</div>
        <ul class="sidebar-menu">
            <li><a href="./client-dashboard.html"><i class="bi bi-house"></i> Dashboard</a></li>
            <li><a href="./profile.html"><i class="bi bi-person-circle"></i> My Profile</a></li>
        </ul>
        <div class="sidebar-heading">Services</div>
        <ul class="sidebar-menu">
            <li><a href="./booking.html"><i class="bi bi-calendar-plus"></i> Book Service</a></li>
            <li><a href="./service-history.html"><i class="bi bi-clock-history"></i> Service History</a></li>
            <li class="active"><a href="./chatbot.html"><i class="bi bi-robot"></i> AI Assistant</a></li>
            <li><a href="#" class="logout-link"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">AI Assistant</h5>
            </div>
            <div class="ms-auto"><button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button></div>
        </header>
        <div class="container-fluid p-4 fade-in" style="max-width:800px;">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Client / AI Assistant</span>
                    <h1 class="dashboard-title">AI Assistant</h1>
                </div>
            </div>

            <div class="card border-0 rounded-4 overflow-hidden"
                style="height:calc(100vh - 200px);min-height:500px;display:flex;flex-direction:column;">
                <div class="card-header bg-transparent border-0 pt-3 pb-0 d-flex align-items-center gap-2">
                    <div
                        style="width:40px;height:40px;border-radius:12px;background:rgba(99,102,241,0.12);display:flex;align-items:center;justify-content:center;color:#818cf8;font-size:1.2rem;">
                        <i class="bi bi-robot"></i>
                    </div>
                    <div>
                        <div class="fw-bold text-white">AutoInsight Assistant</div>
                        <div class="text-success" style="font-size:.78rem;"><i class="bi bi-circle-fill me-1"
                                style="font-size:.5rem;"></i>Online</div>
                    </div>
                </div>
                <div class="card-body p-0" style="flex:1;overflow:hidden;display:flex;flex-direction:column;">
                    <div class="chat-container" id="chatMessages" style="flex:1;overflow-y:auto;"></div>
                    <!-- Quick chips -->
                    <div class="d-flex flex-wrap gap-2 px-3 pb-2">
                        <button class="chat-quick-chip"><i class="bi bi-calendar-check me-1"></i> Book a
                            service</button>
                        <button class="chat-quick-chip"><i class="bi bi-clock-history me-1"></i> My service
                            history</button>
                        <button class="chat-quick-chip"><i class="bi bi-car-front me-1"></i> Vehicle health</button>
                        <button class="chat-quick-chip"><i class="bi bi-credit-card me-1"></i> Pay my invoice</button>
                    </div>
                    <!-- Input -->
                    <div class="p-3 border-top" style="border-color:var(--border-color) !important;">
                        <div class="input-group">
                            <input id="chatInput" type="text" class="form-control"
                                placeholder="Ask anything about your vehicle or services...">
                            <button id="chatSend" class="btn btn-primary"><i class="bi bi-send"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Work Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">Technician</div>
        <ul class="sidebar-menu">
            <li><a href="./technician-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li class="active"><a href="./work-orders.html"><i class="bi bi-card-list"></i> Work Orders</a></li>
            <li><a href="./parts-request.html"><i class="bi bi-box-seam"></i> Parts Request</a></li>
        </ul>
        <div class="sidebar-heading">Account</div>
        <ul class="sidebar-menu">
            <li><a href="../client/profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
            <li><a href="#" class="logout-link"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">Work Orders</h5>
            </div>
            <div class="ms-auto"><button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button></div>
        </header>
        <div class="container-fluid p-4 fade-in">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Technician / Work Orders</span>
                    <h1 class="dashboard-title">Work Orders</h1>
                </div>
                <div class="d-flex gap-2">
                    <select id="woFilter" class="form-select form-select-sm"
                        style="width:160px;background:rgba(255,255,255,.05);border-color:var(--border-color);">
                        <option value="all">All Status</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Queued">Queued</option>
                        <option value="Waiting on Parts">Waiting on Parts</option>
                        <option value="Completed">Completed</option>
                    </select>
                    <input type="text" id="woSearch" class="form-control form-control-sm"
                        style="width:200px;background:rgba(255,255,255,.05);border-color:var(--border-color);"
                        placeholder="Search orders...">
                </div>
            </div>
            <div class="card border-0 rounded-4">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0" id="workOrdersTable">
                            <thead>
                                <tr>
                                    <th>WO ID</th>
                                    <th>Vehicle</th>
                                    <th>Service</th>
                                    <th>Priority</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>

</html>

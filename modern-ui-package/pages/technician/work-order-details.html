<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Work Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">Technician</div>
        <ul class="sidebar-menu">
            <li><a href="./technician-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li class="active"><a href="./work-orders.html"><i class="bi bi-card-list"></i> Work Orders</a></li>
            <li><a href="./parts-request.html"><i class="bi bi-box-seam"></i> Parts Request</a></li>
        </ul>
        <div class="sidebar-heading">Account</div>
        <ul class="sidebar-menu">
            <li><a href="#" class="logout-link"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">Work Order Details</h5>
            </div>
            <div class="ms-auto"><button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button></div>
        </header>
        <div class="container-fluid p-4 fade-in">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Work Orders / Details</span>
                    <h1 class="dashboard-title">Work Order <span id="wo-id">#—</span></h1>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-success" id="completeOrderBtn"><i class="bi bi-check-circle me-2"></i> Mark
                        Complete</button>
                    <a href="./parts-request.html" class="btn btn-outline-secondary"><i class="bi bi-box-seam me-2"></i>
                        Request Parts</a>
                </div>
            </div>

            <div class="row g-4">
                <!-- Info Card -->
                <div class="col-lg-5">
                    <div class="card border-0 rounded-4">
                        <div class="card-header bg-transparent border-0 pt-4 pb-0">
                            <h6 class="fw-bold mb-0">Job Details</h6>
                        </div>
                        <div class="card-body">
                            <dl class="row g-2 mb-0 small">
                                <dt class="col-5 text-muted">Vehicle</dt>
                                <dd class="col-7 fw-semibold" id="wo-vehicle">—</dd>
                                <dt class="col-5 text-muted">License Plate</dt>
                                <dd class="col-7 fw-semibold" id="wo-license">—</dd>
                                <dt class="col-5 text-muted">Service Type</dt>
                                <dd class="col-7 fw-semibold" id="wo-service">—</dd>
                                <dt class="col-5 text-muted">Priority</dt>
                                <dd class="col-7" id="wo-priority">—</dd>
                                <dt class="col-5 text-muted">Status</dt>
                                <dd class="col-7" id="wo-status">—</dd>
                            </dl>
                            <hr style="border-color:var(--border-color);">
                            <h6 class="fw-bold mb-2 text-muted"
                                style="font-size:.8rem;text-transform:uppercase;letter-spacing:.8px;">Client Complaint
                            </h6>
                            <p class="mb-0 small" id="wo-complaint" style="color:#e2e8f0;line-height:1.7;">—</p>
                        </div>
                    </div>

                    <!-- Service Checklist -->
                    <div class="card border-0 rounded-4 mt-4">
                        <div class="card-header bg-transparent border-0 pt-4 pb-0">
                            <h6 class="fw-bold mb-0">Service Checklist</h6>
                        </div>
                        <div class="card-body">
                            <div class="form-check mb-2"><input type="checkbox" class="form-check-input"><label
                                    class="form-check-label">Visual Inspection Complete</label></div>
                            <div class="form-check mb-2"><input type="checkbox" class="form-check-input"><label
                                    class="form-check-label">OBD-II Scan Performed</label></div>
                            <div class="form-check mb-2"><input type="checkbox" class="form-check-input"><label
                                    class="form-check-label">Fluid Levels Checked</label></div>
                            <div class="form-check mb-2"><input type="checkbox" class="form-check-input"><label
                                    class="form-check-label">Test Drive Completed</label></div>
                            <div class="form-check mb-2"><input type="checkbox" class="form-check-input"><label
                                    class="form-check-label">Customer Sign-Off</label></div>
                        </div>
                    </div>
                </div>

                <!-- Notes / Log -->
                <div class="col-lg-7">
                    <div class="card border-0 rounded-4 h-100">
                        <div class="card-header bg-transparent border-0 pt-4 pb-0">
                            <h6 class="fw-bold mb-0">Technician Notes & Log</h6>
                        </div>
                        <div class="card-body d-flex flex-column">
                            <div id="wo-notes" class="flex-grow-1 mb-3" style="min-height:200px;"></div>
                            <form id="addNoteForm">
                                <textarea class="form-control mb-2" rows="3"
                                    placeholder="Add a note, finding, or update..."></textarea>
                                <button type="submit" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i> Add
                                    Note</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>

</html>

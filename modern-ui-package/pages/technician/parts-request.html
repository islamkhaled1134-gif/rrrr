<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Parts Request</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">Technician</div>
        <ul class="sidebar-menu">
            <li><a href="./technician-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li><a href="./work-orders.html"><i class="bi bi-card-list"></i> Work Orders</a></li>
            <li class="active"><a href="./parts-request.html"><i class="bi bi-box-seam"></i> Parts Request</a></li>
        </ul>
        <div class="sidebar-heading">Account</div>
        <ul class="sidebar-menu">
            <li><a href="#" class="logout-link"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">Parts Request</h5>
            </div>
            <div class="ms-auto"><button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button></div>
        </header>
        <div class="container-fluid p-4 fade-in">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Technician / Parts</span>
                    <h1 class="dashboard-title">Parts Requests</h1>
                </div>
            </div>
            <div class="row g-4">
                <!-- Request Form -->
                <div class="col-lg-5">
                    <div class="card border-0 rounded-4 p-4">
                        <h6 class="fw-bold mb-4">New Parts Request</h6>
                        <form id="partsReqForm">
                            <div class="mb-3">
                                <label class="form-label">Work Order ID</label>
                                <select class="form-select">
                                    <option>WO-4592 — Ford Bronco Engine Diagnostics</option>
                                    <option>WO-4595 — Honda Civic Brake Pads</option>
                                </select>
                            </div>
                            <div class="mb-3"><label class="form-label">Part Name</label><input type="text"
                                    class="form-control" placeholder="e.g. Brake Pads (Front)"></div>
                            <div class="mb-3"><label class="form-label">SKU / Part Number</label><input type="text"
                                    class="form-control" placeholder="e.g. BP-1002"></div>
                            <div class="mb-3"><label class="form-label">Quantity</label><input type="number"
                                    class="form-control" min="1" placeholder="1"></div>
                            <div class="mb-3">
                                <label class="form-label">Priority</label>
                                <select class="form-select">
                                    <option value="High">High (ASAP)</option>
                                    <option value="Medium" selected>Medium (This week)</option>
                                    <option value="Low">Low (Flexible)</option>
                                </select>
                            </div>
                            <div class="mb-3"><label class="form-label">Notes</label><textarea class="form-control"
                                    rows="2" placeholder="Additional details..."></textarea></div>
                            <button type="submit" class="btn btn-primary w-100"><i class="bi bi-send me-2"></i> Submit
                                Request</button>
                        </form>
                    </div>
                </div>
                <!-- My Requests -->
                <div class="col-lg-7">
                    <div class="card border-0 rounded-4">
                        <div class="card-header bg-transparent border-0 pt-4 pb-0">
                            <h6 class="fw-bold mb-0">My Requests</h6>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table align-middle mb-0">
                                    <thead>
                                        <tr>
                                            <th>Request ID</th>
                                            <th>Part</th>
                                            <th>Qty</th>
                                            <th>Priority</th>
                                            <th>Status</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td class="fw-bold">PR-001</td>
                                            <td>Brake Pads (Front)</td>
                                            <td>2</td>
                                            <td><span class="badge bg-danger">High</span></td>
                                            <td><span class="status-badge pending">Pending</span></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        document.getElementById('partsReqForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const s = JSON.parse(localStorage.getItem('autoinsight_v1') || '{}');
            s.partsRequests = s.partsRequests || [];
            s.partsRequests.push({ id: 'PR-' + Date.now(), status: 'Pending', at: new Date().toISOString() });
            localStorage.setItem('autoinsight_v1', JSON.stringify(s));
            alert('Parts request submitted!');
            this.reset();
        });
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">Core</div>
        <ul class="sidebar-menu">
            <li><a href="./admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li class="active"><a href="./manage-users.html"><i class="bi bi-people"></i> Users</a></li>
            <li><a href="./permissions.html"><i class="bi bi-shield-lock"></i> Permissions</a></li>
        </ul>
        <div class="sidebar-heading">Modules</div>
        <ul class="sidebar-menu">
            <li><a href="../inventory/manage-stock.html"><i class="bi bi-box-seam"></i> Inventory</a></li>
            <li><a href="../finance/invoices.html"><i class="bi bi-receipt"></i> Finance</a></li>
        </ul>
        <div class="sidebar-heading">Account</div>
        <ul class="sidebar-menu">
            <li><a href="#" class="logout-link"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">Manage Users</h5>
            </div>
            <div class="d-flex align-items-center gap-2 ms-auto">
                <button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button>
                <div class="dropdown">
                    <a href="#"
                        class="d-flex align-items-center gap-2 text-decoration-none dropdown-toggle user-profile"
                        data-bs-toggle="dropdown">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=4361ee&color=fff" alt="">
                        <span class="d-none d-md-inline fw-semibold topbar-username">Admin</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item text-danger logout-link" href="#"><i
                                    class="bi bi-box-arrow-right me-2"></i> Logout</a></li>
                    </ul>
                </div>
            </div>
        </header>

        <div class="container-fluid p-4 fade-in">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Admin / Users</span>
                    <h1 class="dashboard-title">User Management</h1>
                </div>
                <div class="d-flex gap-2">
                    <input id="adminUserSearch" type="text" class="form-control form-control-sm"
                        style="width:220px;background:rgba(255,255,255,0.05);border-color:var(--border-color);"
                        placeholder="Search...">
                    <button class="btn btn-primary btn-sm" id="btnCreateUser"><i class="bi bi-person-plus me-1"></i> New
                        User</button>
                </div>
            </div>

            <div class="data-table-container" id="adminUsersTable">
                <div class="data-header-row">
                    <div>User Name</div>
                    <div>Email Address</div>
                    <div>Role</div>
                    <div>Permissions</div>
                    <div class="text-end">Actions</div>
                </div>
                <div class="data-body-container"></div>
            </div>
        </div>
    </main>

    <!-- Modals (same as admin-dashboard) -->
    <div class="modal fade" id="userModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold" id="userModalTitle">New User</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="userForm">
                        <input type="hidden" id="userFormEmailOriginal">
                        <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control"
                                id="userFormName" required></div>
                        <div class="mb-3"><label class="form-label">Email</label><input type="email"
                                class="form-control" id="userFormEmail" required></div>
                        <div class="mb-3"><label class="form-label">Password</label><input type="text"
                                class="form-control" id="userFormPassword"></div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select class="form-select" id="userFormRole">
                                <option value="client">Client</option>
                                <option value="technician">Technician</option>
                                <option value="service-manager">Service Manager</option>
                                <option value="general-manager">General Manager</option>
                                <option value="stock-keeper">Stock Keeper</option>
                                <option value="finance-manager">Finance Manager</option>
                                <option value="data-analyst">Data Analyst</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="permModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Assign Permissions</h5><button type="button"
                        class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">User: <span class="fw-bold text-white" id="permUserEmail"></span></p>
                    <form id="permForm">
                        <input type="hidden" id="permEmail">
                        <div class="row g-2">
                            <div class="col-6">
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="perm_appointments"><label class="form-check-label"
                                        for="perm_appointments">Appointments</label></div>
                            </div>
                            <div class="col-6">
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="perm_work_orders"><label class="form-check-label"
                                        for="perm_work_orders">Work Orders</label></div>
                            </div>
                            <div class="col-6">
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="perm_inventory"><label class="form-check-label"
                                        for="perm_inventory">Inventory</label></div>
                            </div>
                            <div class="col-6">
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="perm_finance"><label class="form-check-label"
                                        for="perm_finance">Finance</label></div>
                            </div>
                            <div class="col-6">
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="perm_analytics"><label class="form-check-label"
                                        for="perm_analytics">Analytics</label></div>
                            </div>
                            <div class="col-6">
                                <div class="form-check"><input class="form-check-input" type="checkbox"
                                        id="perm_admin"><label class="form-check-label" for="perm_admin">Admin</label>
                                </div>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Save Permissions</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>

</html>

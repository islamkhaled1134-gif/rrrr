<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">Core</div>
        <ul class="sidebar-menu">
            <li><a href="./admin-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li class="active"><a href="./manage-users.html"><i class="bi bi-people"></i> Users</a></li>
            <li><a href="./permissions.html"><i class="bi bi-shield-lock"></i> Permissions</a></li>
        </ul>
        <div class="sidebar-heading">Account</div>
        <ul class="sidebar-menu">
            <li><a href="#" class="logout-link"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">Edit User</h5>
            </div>
            <div class="ms-auto"><button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button></div>
        </header>
        <div class="container-fluid p-4 fade-in" style="max-width:680px;">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Admin / Users / Edit</span>
                    <h1 class="dashboard-title">Edit User</h1>
                </div>
            </div>
            <div class="card border-0 rounded-4 p-4">
                <form id="editUserForm">
                    <div class="row g-3">
                        <div class="col-12"><label class="form-label">Full Name</label><input type="text"
                                class="form-control" id="editName" required></div>
                        <div class="col-12"><label class="form-label">Email Address</label><input type="email"
                                class="form-control" id="editEmail" required></div>
                        <div class="col-12"><label class="form-label">New Password <small class="text-muted">(leave
                                    blank to keep)</small></label><input type="text" class="form-control"
                                id="editPassword" placeholder="New password"></div>
                        <div class="col-12">
                            <label class="form-label">Role</label>
                            <select class="form-select" id="editRole">
                                <option value="client">Client</option>
                                <option value="technician">Technician</option>
                                <option value="service-manager">Service Manager</option>
                                <option value="general-manager">General Manager</option>
                                <option value="stock-keeper">Stock Keeper</option>
                                <option value="finance-manager">Finance Manager</option>
                                <option value="data-analyst">Data Analyst</option>
                                <option value="admin">Admin</option>
                            </select>
                        </div>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-primary"><i class="bi bi-save me-2"></i> Save
                            Changes</button>
                        <a href="./manage-users.html" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
    <script>
        // Pre-fill from URL param
        const params = new URLSearchParams(location.search);
        const emailParam = params.get('email');
        const s = JSON.parse(localStorage.getItem('autoinsight_v1') || '{}');
        const user = (s.users || []).find(u => u.email === emailParam);
        if (user) {
            document.getElementById('editName').value = user.name || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editRole').value = user.role || 'client';
        }
        document.getElementById('editUserForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const s2 = JSON.parse(localStorage.getItem('autoinsight_v1') || '{}');
            const u = (s2.users || []).find(x => x.email === emailParam);
            if (u) {
                u.name = document.getElementById('editName').value.trim();
                u.email = document.getElementById('editEmail').value.trim();
                u.role = document.getElementById('editRole').value;
                const pw = document.getElementById('editPassword').value;
                if (pw) u.password = pw;
                localStorage.setItem('autoinsight_v1', JSON.stringify(s2));
            }
            window.location.href = 'manage-users.html';
        });
    </script>
</body>

</html>

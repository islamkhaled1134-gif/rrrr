<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Manage Stock</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
</head>

<body class="vms-app">
    <nav class="sidebar">
        <a href="../../index.html" class="brand"><i class="bi bi-car-front-fill" style="color:#818cf8;"></i>
            AutoInsight</a>
        <div class="sidebar-heading">Inventory</div>
        <ul class="sidebar-menu">
            <li><a href="./inventory-dashboard.html"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
            <li class="active"><a href="./manage-stock.html"><i class="bi bi-box-seam"></i> Manage Stock</a></li>
            <li><a href="./parts-approval.html"><i class="bi bi-check2-square"></i> Parts Approval</a></li>
        </ul>
        <div class="sidebar-heading">Account</div>
        <ul class="sidebar-menu">
            <li><a href="#" class="logout-link"><i class="bi bi-box-arrow-left"></i> Logout</a></li>
        </ul>
    </nav>
    <main class="main-content">
        <header class="topbar">
            <div class="d-flex align-items-center gap-3">
                <button id="sidebarToggle" class="btn btn-outline-secondary d-md-none"><i
                        class="bi bi-list"></i></button>
                <h5 class="mb-0 fw-bold">Manage Stock</h5>
            </div>
            <div class="ms-auto"><button id="themeSwitch" class="btn btn-outline-secondary rounded-circle"
                    style="width:38px;height:38px;padding:0;"><i class="bi bi-moon-stars"></i></button></div>
        </header>
        <div class="container-fluid p-4 fade-in">
            <div class="dashboard-header">
                <div>
                    <span class="dashboard-breadcrumbs">Inventory / Stock</span>
                    <h1 class="dashboard-title">Stock Management</h1>
                </div>
                <div class="d-flex gap-2">
                    <input id="invSearch" type="text" class="form-control form-control-sm"
                        style="width:200px;background:rgba(255,255,255,.05);border-color:var(--border-color);"
                        placeholder="Search stock...">
                    <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#addItemModal"><i
                            class="bi bi-plus me-1"></i> Add Item</button>
                </div>
            </div>
            <div class="card border-0 rounded-4">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table align-middle mb-0" id="inventoryTable">
                            <thead>
                                <tr>
                                    <th>SKU</th>
                                    <th>Part Name</th>
                                    <th>Category</th>
                                    <th>Qty</th>
                                    <th>Unit Price</th>
                                    <th>Min Stock</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Item Modal -->
    <div class="modal fade" id="addItemModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Add Inventory Item</h5><button type="button"
                        class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addInventoryForm">
                        <div class="mb-3"><label class="form-label">SKU</label><input type="text" class="form-control"
                                id="invSku" required></div>
                        <div class="mb-3"><label class="form-label">Part Name</label><input type="text"
                                class="form-control" id="invName" required></div>
                        <div class="mb-3"><label class="form-label">Category</label><input type="text"
                                class="form-control" id="invCategory"></div>
                        <div class="row g-3 mb-3">
                            <div class="col-6"><label class="form-label">Quantity</label><input type="number"
                                    class="form-control" id="invQty" min="0"></div>
                            <div class="col-6"><label class="form-label">Unit</label><input type="text"
                                    class="form-control" id="invUnit" placeholder="Units"></div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-6"><label class="form-label">Price ($)</label><input type="number"
                                    class="form-control" id="invPrice" min="0" step="0.01"></div>
                            <div class="col-6"><label class="form-label">Min Stock</label><input type="number"
                                    class="form-control" id="invMinStock" min="0"></div>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-outline-secondary"
                                data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Add Item</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/main.js"></script>
</body>

</html>

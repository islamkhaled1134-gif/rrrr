<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoInsight — Forgot Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/forms.css">
</head>

<body class="auth-bg vms-app">
    <div class="bg-glow"></div>

    <!-- Forgot form card -->
    <div class="auth-card card fade-in" id="forgotCard">
        <div class="card-body">
            <div class="brand-row">
                <span class="brand-pill"><i class="bi bi-car-front-fill"></i> AutoInsight</span>
                <a href="./login.html" class="auth-back-btn"><i class="bi bi-arrow-left"></i></a>
            </div>

            <h2 class="auth-title">Forgot Password</h2>
            <p class="auth-subtitle">Enter your email and we'll send a reset link.</p>
            <div class="auth-divider"></div>

            <form id="forgotForm">
                <div class="mb-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="name@example.com" required>
                </div>
                <button type="submit" class="btn btn-primary btn-auth text-white">
                    <i class="bi bi-send me-2"></i> Send Reset Link
                </button>
                <div class="auth-link-row">
                    Remembered your password? <a href="./login.html">Sign In</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Success card (hidden initially) -->
    <div class="auth-card card fade-in" id="forgotSuccess" style="display:none;">
        <div class="card-body text-center">
            <div class="auth-success-icon">
                <i class="bi bi-envelope-check"></i>
            </div>
            <h3 class="fw-bold text-white mb-2">Check your inbox!</h3>
            <p class="auth-subtitle mb-4">We've sent a password reset link to your email address.</p>
            <a href="./login.html" class="btn btn-primary btn-auth text-white">
                <i class="bi bi-box-arrow-in-right me-2"></i> Back to Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>

</html>
